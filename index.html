<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HƯỚNG DẪN THỦ TỤC THU NỘP PHÍ ĐẢNG TRÊN ỨNG DỤNG ICPV TTHC</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button id="fullscreen-btn" class="fullscreen-btn" title="Chuyển đổi toàn màn hình">
        <svg class="icon-maximize" viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
        <svg class="icon-minimize" viewBox="0 0 24 24" width="26" height="26" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" style="display:none;"><path d="M4 14h6v6m10-6h-6v6M4 10h6V4m10 6h-6V4"></path></svg>
    </button>

    <div class="main-container">
        <div class="book-container">
            <div class="book" id="book">
                
                <button id="prev-btn" class="nav-arrow left">◀</button>
                <button id="next-btn" class="nav-arrow right">▶</button>

                <div class="page cover" id="page-1">
                    <div class="front-face">
                        <div class="image-placeholder-box">
                            <img src="images/BIATRUOC.png" alt="Bìa trước">
                            <span class="placeholder-text">BÌA TRƯỚC</span>
                        </div>
                    </div>
                    <div class="back-face">
                        <div class="page-number-box alignment-left">01</div>
                        <div class="image-placeholder-box">
                            <img src="images/1.png" alt="Trang 1">
                            <span class="placeholder-text">TRANG 01</span>
                        </div>
                    </div>
                </div>

                <div class="page" id="page-2">
                    <div class="front-face">
                        <div class="page-number-box alignment-right">02</div>
                        <div class="image-placeholder-box">
                            <img src="images/2.png" alt="Trang 2">
                            <span class="placeholder-text">TRANG 02</span>
                        </div>
                    </div>
                    <div class="back-face">
                        <div class="page-number-box alignment-left">03</div>
                        <div class="image-placeholder-box">

                </div>

                        </div>
                    </div>
                    <div class="back-face">
                        <div class="page-number-box alignment-left">05</div>

                            <span class="placeholder-text">TRANG 05</span>
                        </div>
                    </div>
                </div>

                <div class="page" id="page-4">
                    <div class="front-face">
                        <div class="page-number-box alignment-right">06</div>

                    <div class="back-face">

            <input type="range" id="page-slider" min="1" max="5" value="1">

    <img src="" alt="" class="BACKGROUND">

    <script src="js/flipbook.js"></script>
